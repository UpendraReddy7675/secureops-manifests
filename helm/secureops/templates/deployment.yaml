apiVersion: apps/v1
kind: Deployment
metadata:
  name: secureops-app
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: secureops-app
  template:
    metadata:
      labels:
        app: secureops-app
    spec:
      containers:
        - name: secureops-app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: 8080
